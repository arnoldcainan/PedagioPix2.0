{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>PedágioPIX | Acesso Restrito</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3F4F6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            background: #ffffff;
            padding: 2.5rem;
        }
        .brand-icon {
            width: 60px;
            height: 60px;
            background-color: #EEF2FF;
            color: #4F46E5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-icon">
                <i class="fa-solid fa-road-barrier fa-2x"></i>
            </div>
            <h3 class="fw-bold text-dark mb-1">PedágioPIX</h3>
            <p class="text-muted small">Acesso restrito para operadores</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger small py-2 rounded-3 text-center">
                Usuário ou senha incorretos. Tente novamente.
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control fw-bold" id="floatingInput" placeholder="Usuário" required autofocus>
                <label for="floatingInput"><i class="fa-regular fa-user me-2 text-muted"></i>Usuário</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control fw-bold" id="floatingPassword" placeholder="Senha" required>
                <label for="floatingPassword"><i class="fa-solid fa-lock me-2 text-muted"></i>Senha</label>
            </div>

            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" type="submit" style="background-color: #4F46E5; border: none;">
                Entrar no Sistema <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted"><i class="fa-solid fa-shield-halved me-1"></i> Ambiente Seguro</small>
        </div>
    </div>

</body>
</html>
