{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Nova Cobrança</h2>
                    <p class="text-muted">Selecione a categoria e informe a placa para gerar o PIX.</p>
                </div>

                <form method="POST" action="{% url 'gerar_cobranca_pix' %}">
                    {% csrf_token %}

                    <div class="form-floating mb-4">
                        <input type="text" name="placa" id="placa"
                               class="form-control form-control-lg text-uppercase fw-bold"
                               placeholder="ABC1D23"
                               maxlength="7" minlength="7"
                               pattern="[A-Za-z]{3}[0-9][A-Za-z0-9][0-9]{2}"
                               required autocomplete="off"
                               style="font-size: 1.5rem; letter-spacing: 2px;">
                        <label for="placa">Placa do Veículo</label>
                    </div>

                    <label class="form-label fw-semibold mb-3">Categoria da Tarifa</label>

                    <div class="row g-3 mb-4">
                        {% for cat in categorias %}
                        <div class="col-4 col-md-3">
                            <input type="radio" class="btn-check categoria-radio" name="categoria_id"
                                   id="cat_{{ cat.id }}" value="{{ cat.id }}"
                                   data-tipo="{{ cat.tipo_cobranca }}"
                                   data-valor="{{ cat.valor_base|stringformat:'f' }}" required>

                            <label class="btn btn-outline-primary w-100 h-100 p-2 rounded-4 d-flex flex-column align-items-center justify-content-center custom-radio-card" for="cat_{{ cat.id }}">
                                <span class="fw-bold mb-1">{{ cat.codigo }}</span>
                                <i class="{{ cat.icone }} fa-lg mb-2"></i>
                                <span class="small fw-semibold">{{ cat.descricao|truncatewords:2 }}</span>
                                <span class="small text-muted">R$ {{ cat.valor_base }}</span>
                            </label>
                        </div>
                        {% endfor %}
                    </div>

                    <div id="div-eixos" class="mb-4 p-3 bg-light rounded-4 border d-none transition-all">
                        <label for="qtd_eixos" class="form-label fw-bold text-primary">
                            <i class="fa-solid fa-truck-moving me-2"></i>Informe a quantidade de eixos da composição:
                        </label>
                        <div class="input-group input-group-lg">
                            <button class="btn btn-outline-secondary px-4 fw-bold" type="button" onclick="mudarEixo(-1)">-</button>
                            <input type="number" class="form-control text-center fw-bold text-primary fs-4" name="qtd_eixos" id="qtd_eixos" value="1" min="1" max="20" readonly>
                            <button class="btn btn-outline-secondary px-4 fw-bold" type="button" onclick="mudarEixo(1)">+</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold py-3 shadow-sm" id="btnGerar">
                        <i class="fa-solid fa-qrcode me-2"></i> Gerar Cobrança <span id="label-valor"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Estilização customizada para os cards de seleção */
    .custom-radio-card {
        transition: all 0.2s ease-in-out;
        border: 2px solid #E5E7EB;
        color: var(--text-main);
    }
    .custom-radio-card i {
        color: var(--text-muted);
        transition: color 0.2s;
    }
    .custom-radio-card:hover {
        background-color: #F3F4F6;
        border-color: #D1D5DB;
    }
    .btn-check:checked + .custom-radio-card {
        background-color: #EEF2FF; /* Fundo levemente azulado */
        border-color: var(--primary-color);
        color: var(--primary-color);
    }
    .btn-check:checked + .custom-radio-card i,
    .btn-check:checked + .custom-radio-card .text-muted {
        color: var(--primary-color) !important;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    // Filtro de placa
    document.getElementById('placa').addEventListener('input', function(e) {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    // Lógica Dinâmica para a Categoria Especial
    const radios = document.querySelectorAll('.categoria-radio');
    const divEixos = document.getElementById('div-eixos');
    const inputEixos = document.getElementById('qtd_eixos');
    const labelValor = document.getElementById('label-valor');
    let valorBaseAtual = 0;
    let tipoAtual = '';

    radios.forEach(radio => {
        radio.addEventListener('change', function() {
            tipoAtual = this.getAttribute('data-tipo');
            valorBaseAtual = parseFloat(this.getAttribute('data-valor'));

            if (tipoAtual === 'POR_EIXO') {
                // É a CAT 15, exibe os botões de eixos
                divEixos.classList.remove('d-none');
                inputEixos.value = 1; // Reseta para 1
            } else {
                // Categoria normal, esconde os botões
                divEixos.classList.add('d-none');
            }
            atualizarBotao();
        });
    });

    // Função dos botões + e -
    function mudarEixo(valor) {
        let atual = parseInt(inputEixos.value);
        let novo = atual + valor;
        if (novo >= 1 && novo <= 20) {
            inputEixos.value = novo;
            atualizarBotao();
        }
    }

    // Calcula o valor final e exibe no botão de gerar
    function atualizarBotao() {
        let total = valorBaseAtual;
        if (tipoAtual === 'POR_EIXO') {
            total = valorBaseAtual * parseInt(inputEixos.value);
        }
        // Formata para moeda brasileira BRL
        labelValor.innerText = "- R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    // Loading ao enviar
    document.querySelector('form').addEventListener('submit', function() {
        let btn = document.getElementById('btnGerar');
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Conectando ao Banco...';
        btn.classList.add('disabled');
    });
</script>
{% endblock %}
