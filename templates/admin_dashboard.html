{% extends 'base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <h5 class="fw-bold mb-0">Fluxo de Arrecadação (Últimos 7 dias)</h5>
            </div>
            <div class="card-body p-4">
                <canvas id="fluxoFinanceiro" style="width: 100%; height: 300px;"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('fluxoFinanceiro').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ labels_grafico|safe }},
            datasets: [{
                label: 'Faturamento (R$)',
                data: {{ dados_grafico|safe }},
                borderColor: '#4F46E5',
                backgroundColor: 'rgba(79, 70, 229, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 5,
                pointBackgroundColor: '#4F46E5'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { display: false } },
                x: { grid: { display: false } }
            }
        }
    });
</script>
{% endblock %}
